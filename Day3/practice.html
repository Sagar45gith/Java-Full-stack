<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <style>
        .active {
            color: red;
        }
    </style>
</head>
<body>
    <p id="text">Hello World</p>
    <button onclick="changeText()">Toggle</button>
    <script>
        let el = document.getElementById("text");
        function changeText(){
            el.classList.toggle("active");   //whats the use of classList.toggle?
            // The classList.toggle() method is used to add or remove a class from an element's class list. If the class is already present, it removes it; if it's not present, it adds it. This is useful for toggling styles or behaviors on an element without needing to check if the class is already applied.
        }
    </script>
</body>
</html>
