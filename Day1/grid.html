<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            gap:10px;
        }
        .box{
            background:rgb(98, 70, 213);
            color:wheat;
            padding:40px;
            text-align: center;
            font-size:20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class ="box">1</div>
        <div class ="box">2</div>
        <div class ="box">3</div>
    </div>
</body>
</html>
