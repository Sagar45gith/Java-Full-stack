diff b/w italic and emphasized text:
- Italic text is typically used to indicate a different tone or style, such as for emphasis or to denote titles of works. It is often rendered in a slanted font style.
- Emphasized text is used to indicate that a particular word or phrase should be given special importance. It is often rendered in a bold or italic font style, depending on the context and the styling applied to the webpage.

diff b/w bold and strong text:
- Bold text is typically used to make text stand out visually. It is often rendered in a thicker font style to draw attention to the text.
- Strong text is used to indicate that a particular word or phrase should be given strong importance. It is often rendered in a bold font style, but it can also be styled differently depending on the context and the styling applied to the webpage.
